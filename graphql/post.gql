query Post($slug: String, $locale: SiteLocale) {
	post(locale: $locale, filter: { slug: { eq: $slug } }) {
		...PostFragment
	}
}

query AllPosts($locale: SiteLocale, $first: IntType = 500, $skip: IntType = 0) {
	allPosts(locale: $locale, first: $first, skip: $skip, orderBy: [_createdAt_DESC]) {
		...PostFragment
	}
	_allPostsMeta {
		count
	}
}

fragment PostFragment on PostRecord {
	image {
		...ImageFragment
	}
	intro
	slug
	title
	color {
		color {
			hex
		}
	}
	content {
		blocks {
			__typename
			... on LinkImageRecord {
				id
				name
				url
				image {
					...ImageFragment
				}
			}
			... on ListRecord {
				id
				title
				items {
					__typename
					... on ListItemRecord {
						id
						label
						value
						content {
							blocks
							links
							value
						}
					}
				}
			}
		}
		value
		links
	}
	author {
		name
	}
	_updatedAt
}

fragment PostLightFragment on PostRecord {
	image {
		...ImageFragment
	}
	intro
	slug
	title
	author {
		name
	}
	color {
		color {
			hex
		}
	}
	_updatedAt
}
